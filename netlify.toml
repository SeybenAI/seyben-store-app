# Netlify config para Seyben Shopify app (React Router v7).
#
# El plugin @netlify/vite-plugin-react-router se encarga de convertir el
# build de React Router en Netlify Functions automaticamente. No hace
# falta configurar functions individuales.
#
# Notas:
# - En Netlify Pro las functions tienen 26s timeout (suficiente para el
#   action de "Crear agente" que tarda 5-15s).
# - Las env vars (SHOPIFY_API_KEY, DATABASE_URL, etc.) se configuran desde
#   el dashboard Netlify -> Site settings -> Environment variables.

[build]
  command = "npm run setup && npm run build"
  publish = "build/client"

[build.environment]
  # Node 22 LTS - cumple con engines en package.json (>=22.12).
  # Los binaryTargets de Prisma estan en schema.prisma (no como env var).
  NODE_VERSION = "22"
  # SHOPIFY_API_KEY (client_id publico de Shopify) y SCOPES viven en
  # shopify.app.toml comiteado al repo. No son secrets — el secret scanner
  # de Netlify los confunde al verlos tambien como env vars.
  # SHOPIFY_API_KEY (client_id Shopify publico), SCOPES (config publica), y
  # SHOPIFY_APP_URL (URL publica de la app) aparecen en shopify.app.toml y/o
  # privacy.tsx y NO son secrets — son configuracion publica.
  SECRETS_SCAN_OMIT_KEYS = "SHOPIFY_API_KEY,SCOPES,SHOPIFY_APP_URL"

# Headers de seguridad globales (Shopify exige X-Frame-Options ALLOWALL
# para el embedded admin, asi que NO lo pongas a DENY).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
